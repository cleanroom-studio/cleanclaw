apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cleanclaw.fullname" . }}-gateway
  labels:
    {{- include "cleanclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels:
      {{- include "cleanclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cleanclaw.selectorLabels" . | nindent 6 }}
    spec:
      {{- with .Values.image.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.gateway.terminationGracePeriodSeconds }}
      containers:
      - name: gateway
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.gateway.port }}
          name: http
        - containerPort: {{ .Values.hooks.port }}
          name: hooks
        envFrom:
        - configMapRef:
            name: {{ include "cleanclaw.fullname" . }}-config
        env:
        - name: CLEANCLAW_HOME
          value: "/data/.cleanclaw"
        - name: CLEANCLAW_STORAGE_DSN
          valueFrom:
            secretKeyRef:
              name: {{ include "cleanclaw.fullname" . }}-secrets
              key: STORAGE_DSN
        {{- if and (ne .Values.objectStore.type "local") .Values.objectStore.accessKey }}
        - name: CLEANCLAW_OBJECT_STORE_ACCESSKEY
          valueFrom:
            secretKeyRef:
              name: {{ include "cleanclaw.fullname" . }}-secrets
              key: OBJECT_STORE_ACCESSKEY
        - name: CLEANCLAW_OBJECT_STORE_SECRETKEY
          valueFrom:
            secretKeyRef:
              name: {{ include "cleanclaw.fullname" . }}-secrets
              key: OBJECT_STORE_SECRETKEY
        {{- end }}
        {{- if and .Values.sandbox.enabled .Values.sandbox.e2bApiKey }}
        - name: E2B_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "cleanclaw.fullname" . }}-secrets
              key: E2B_API_KEY
        {{- end }}
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep {{ .Values.gateway.preStopSleepSeconds }}"]
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          periodSeconds: 30
          failureThreshold: 6
        resources:
          {{- toYaml .Values.gateway.resources | nindent 10 }}
