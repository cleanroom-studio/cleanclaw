apiVersion: v1
kind: Service
metadata:
  name: {{ include "cleanclaw.fullname" . }}
  labels:
    {{- include "cleanclaw.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "cleanclaw.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: hooks
      port: {{ .Values.hooks.port }}
      targetPort: hooks
