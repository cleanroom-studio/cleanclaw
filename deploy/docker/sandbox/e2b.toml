# E2B sandbox template config.
#
# Use the template id (or name "cleanclaw-sandbox") to create a
# sandbox:
#
#   # Python
#   from e2b import AsyncSandbox
#   sandbox = await AsyncSandbox.create("cleanclaw-sandbox")
#
#   # JS
#   import { Sandbox } from 'e2b'
#   const sandbox = await Sandbox.create('cleanclaw-sandbox')

start_cmd = "sleep infinity"
dockerfile = "e2b.Dockerfile"
template_name = "cleanclaw-sandbox"
template_id = "cleanclaw-sandbox"
