## Multi-pod CleanClaw deployment.
#
#
## Two gateway pods behind an nginx load balancer + a shared
## Postgres. Used for the multi-replica / horizontal-scalability
## smoke test in CI.

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "18953:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cleanclaw-1
      - cleanclaw-2

  cleanclaw-1:
    image: cleanclaw/cleanclaw:dev
    restart: unless-stopped
    environment:
      CLEANCLAW_HOME: /data
      CLEANCLAW_PORT: "18953"
      CLEANCLAW_LOG: info
      CLEANCLAW_STORAGE_TYPE: postgres
      CLEANCLAW_STORAGE_DSN: postgres://cleanclaw:cleanclaw@postgres:5432/cleanclaw?sslmode=disable
      CLEANCLAW_STORAGE_AUTOMIGRATE: "true"
    volumes:
      - cleanclaw-data-1:/data
    depends_on:
      postgres:
        condition: service_healthy

  cleanclaw-2:
    image: cleanclaw/cleanclaw:dev
    restart: unless-stopped
    environment:
      CLEANCLAW_HOME: /data
      CLEANCLAW_PORT: "18953"
      CLEANCLAW_LOG: info
      CLEANCLAW_STORAGE_TYPE: postgres
      CLEANCLAW_STORAGE_DSN: postgres://cleanclaw:cleanclaw@postgres:5432/cleanclaw?sslmode=disable
      CLEANCLAW_STORAGE_AUTOMIGRATE: "true"
    volumes:
      - cleanclaw-data-2:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cleanclaw
      POSTGRES_PASSWORD: cleanclaw
      POSTGRES_DB: cleanclaw
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleanclaw -d cleanclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cleanclaw-data-1:
  cleanclaw-data-2:
  postgres-data:
