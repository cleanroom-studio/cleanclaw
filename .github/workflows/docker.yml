name: Docker

# The Rust pipeline is a single stage that
# produces the cleanclaw binary + the 4 plugin binaries.
#
# Triggers:
#   - push to main → build + push `dev` tag (nightly edge)
#   - tags v*    → build + push `vX.Y.Z` tag (release)
#   - PRs        → build only (validation)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/cleanroom-studio/cleanclaw

jobs:
  # Cheap pre-flight: Dockerfile + scripts lint. Catches
  # arch-regressions in PRs without spinning up the QEMU
  # buildx dance (which can be slow on a free runner).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Script tests
        run: bash scripts/tests/run_all.sh
      - name: Bash syntax check
        run: |
          for s in scripts/release.sh scripts/build-docker.sh scripts/dev-build.sh; do
            bash -n "$s"
          done
          for t in scripts/tests/*_test.sh; do
            bash -n "$t"
          done

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev" >> $GITHUB_OUTPUT
          fi
          echo "DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            CLEANCLAW_VERSION=${{ steps.version.outputs.VERSION }}
            CLEANCLAW_COMMIT=${{ github.sha }}
            CLEANCLAW_DATE=${{ steps.version.outputs.DATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Per-arch self-test: build the image for one arch, run it
  # briefly, and assert the binary's ELF arch matches the
  # target. Catches QEMU misconfig + Cargo.lock drift before
  # the multi-arch push.
  arch-smoke:
    name: arch smoke (${{ matrix.platform }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (single arch, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: cleanclaw/cleanclaw:smoketest
          build-args: |
            CLEANCLAW_VERSION=smoketest
            CLEANCLAW_COMMIT=${{ github.sha }}
            CLEANCLAW_DATE=2026-01-01T00:00:00Z
          cache-from: type=gha

      - name: Verify binary arch
        # The Dockerfile's `file` assertion already runs at build
        # time; this is a belt-and-suspenders check on the
        # resulting image. The matrix platform drives the
        # expected arch; QEMU emulates the cross-arch build.
        run: |
          set -eux
          EXPECTED="${{ matrix.platform }}"
          # `file` reports the binary's arch regardless of the
          # host the container is running on. amd64 → x86-64,
          # arm64 → aarch64.
          case "$EXPECTED" in
              linux/amd64) GREP='x86-64' ;;
              linux/arm64) GREP='aarch64' ;;
              *) echo "unknown platform: $EXPECTED"; exit 1 ;;
          esac
          ARCH_OUT=$(docker run --rm --platform "$EXPECTED" cleanclaw/cleanclaw:smoketest \
              /bin/sh -c "file /usr/local/bin/cleanclaw | grep -oE '$GREP' || true")
          if [ -z "$ARCH_OUT" ]; then
              echo "FAIL: expected $GREP in file output"
              docker run --rm --platform "$EXPECTED" cleanclaw/cleanclaw:smoketest \
                  /bin/sh -c "file /usr/local/bin/cleanclaw"
              exit 1
          fi
          echo "OK: binary arch matches $EXPECTED ($ARCH_OUT)"

      - name: Verify binary runs
        # The container should at least print the help text and
        # exit 0. We don't actually start the gateway (no port
        # mapping needed) — just confirm the ELF loads on the
        # target arch.
        run: |
          docker run --rm --platform "${{ matrix.platform }}" cleanclaw/cleanclaw:smoketest \
              /usr/local/bin/cleanclaw version
